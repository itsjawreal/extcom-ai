<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Extcom AI</title>
  <style>
    :root {
      color-scheme: dark;

      --bg: #070a11;
      --panel: #0f1726;
      --panel-2: #111c2e;
      --panel-3: #142033;
      --border: #243149;
      --border-soft: #1b263a;

      --text: #f8fafc;
      --text-soft: #cbd5e1;
      --muted: #8ea0ba;
      --muted-2: #60708a;

      --accent: #1e5fcc;
      --accent-hover: #1b55b8;
      --accent-soft: #102b55;

      --success: #22c55e;
      --danger: #ef4444;

      --radius-sm: 8px;
      --radius-md: 10px;
      --radius-lg: 12px;
    }
    * { box-sizing: border-box; }
    body {
      width: 380px;
      min-height: 580px;
      margin: 0;
      padding: 16px 18px;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.45;
    }
    h1 {
      margin: 0;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    /* Header */
    .popup-header {
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 9px;
      font-weight: 700;
      font-size: 14.5px;
      letter-spacing: -0.01em;
    }
    .brand-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 24px;
      border-radius: var(--radius-sm);
      background: var(--accent-soft);
      color: var(--accent);
      flex-shrink: 0;
    }
    .brand-icon svg {
      width: 13px;
      height: 13px;
      fill: currentColor;
    }
    .icon-button {
      width: 34px;
      height: 34px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 14px;
      font-weight: 400;
      background: var(--panel);
      border: 1px solid var(--border-soft);
      border-radius: var(--radius-sm);
      color: var(--muted);
    }
    .icon-button:hover {
      background: var(--panel-2);
      color: var(--text);
    }
    .settings-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    /* Cards */
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
    }

    /* Status card */
    .status-card {
      min-height: 70px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 12px 16px;
      margin-bottom: 12px;
      background: var(--panel-2);
    }
    .status-title {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0 0 3px;
      font-size: 14px;
      font-weight: 700;
    }
    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted-2);
      flex-shrink: 0;
    }
    .status-card[data-state="connected"] .status-dot { background: var(--success); }
    .status-card[data-state="error"] .status-dot { background: var(--danger); }
    .status-detail {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      min-height: 15px;
    }

    /* Stats */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }
    .stat-card {
      min-height: 84px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 14px;
      border-color: var(--border-soft);
    }
    .stat-card .stat-value {
      display: block;
      font-size: 22px;
      font-weight: 700;
    }
    .stat-card .stat-label {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 11.5px;
    }

    .history-heading {
      margin: 0 0 8px;
      font-size: 11.5px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .history-list {
      max-height: 280px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .history-item {
      background: var(--panel-2);
      border-radius: var(--radius-md);
      border: 1px solid var(--border-soft);
      padding: 11px 12px;
    }
    .history-item p {
      margin: 0 0 5px;
      font-size: 13px;
      line-height: 1.35;
      word-break: break-word;
    }
    .history-item .history-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      color: var(--muted-2);
      font-size: 11.5px;
    }
    .history-item .history-meta .inserted-tag {
      color: var(--muted-2);
      flex-shrink: 0;
    }
    .history-item .history-meta a.inserted-tag {
      color: var(--success);
      text-decoration: none;
      cursor: pointer;
    }
    .history-item .history-meta a.inserted-tag:hover {
      text-decoration: underline;
    }
    .history-empty {
      color: var(--muted);
      text-align: center;
      padding: 20px 0;
    }

    .button-secondary {
      margin-top: 10px;
      background: transparent;
      border: 1px solid #3a2436;
      color: var(--danger);
    }
    .button-secondary:hover { background: #1a1013; }

    .footer-links {
      display: flex;
      justify-content: center;
      gap: 18px;
      margin-top: 14px;
    }
    .footer-links a {
      display: inline-flex;
      color: var(--muted-2);
    }
    .footer-links a:hover {
      color: var(--text);
    }
    .footer-links svg {
      width: 17px;
      height: 17px;
      fill: currentColor;
    }

    label {
      display: block;
      margin-bottom: 11px;
      font-weight: 650;
    }
    input, select, textarea {
      display: block;
      width: 100%;
      margin-top: 6px;
      padding: 9px 12px;
      font: inherit;
      font-size: 13px;
      font-weight: 400;
      min-height: 40px;
      border: 1px solid var(--border-soft);
      border-radius: 9px;
      background: var(--panel-2);
      color: var(--text);
      resize: vertical;
    }
    textarea {
      min-height: 80px;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    button {
      width: 100%;
      height: 42px;
      padding: 0 12px;
      font: inherit;
      font-weight: 650;
      border: none;
      border-radius: var(--radius-md);
      background: var(--accent);
      color: #fff;
      cursor: pointer;
    }
    button:hover { background: var(--accent-hover); }
    button:disabled {
      opacity: 0.6;
      cursor: default;
    }
    #save {
      height: 44px;
      margin-top: 4px;
    }
    .status {
      min-height: 18px;
      margin: 8px 0 0;
      text-align: center;
      color: var(--muted);
    }
    .hint {
      margin: 10px 0 0;
      color: var(--muted-2);
      font-size: 11.5px;
      line-height: 1.5;
    }
    .field-hint {
      margin-top: -5px;
      margin-bottom: 11px;
    }
    .field-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
    }
    .field-row-value {
      font-weight: 400;
      color: var(--muted);
    }

    /* Custom range slider — the native control looks cheap/default otherwise */
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      min-height: auto;
      height: 5px;
      padding: 0;
      margin-top: 10px;
      border: none;
      border-radius: 999px;
      background: #263247;
    }
    input[type="range"]::-webkit-slider-runnable-track {
      height: 5px;
      border-radius: 999px;
      background: transparent;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      margin-top: -5.5px;
      cursor: pointer;
    }
    input[type="range"]::-moz-range-track {
      height: 5px;
      border-radius: 999px;
      background: #263247;
      border: none;
    }
    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      cursor: pointer;
    }

    .segmented {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }
    .segmented button {
      flex: 1;
      height: 38px;
      padding: 0;
      font-size: 13px;
      font-weight: 600;
      border-radius: var(--radius-sm);
      background: var(--panel);
      border: 1px solid var(--border-soft);
      color: var(--muted);
    }
    .segmented button[aria-pressed="true"] {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--text);
    }

    .button-ghost {
      background: var(--panel);
      border: 1px solid var(--border-soft);
      color: var(--text-soft);
    }
    .button-ghost:hover {
      background: var(--panel-2);
      border-color: var(--border);
    }

    .tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
    }
    .tab {
      flex: 1;
      height: 36px;
      padding: 0;
      font-size: 13px;
      font-weight: 600;
      border-radius: var(--radius-sm);
      background: var(--panel);
      border: 1px solid var(--border-soft);
      color: var(--muted);
    }
    .tab:hover {
      background: var(--panel-2);
    }
    .tab[aria-selected="true"] {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--text);
    }
    #tab-panel-advanced .button-ghost {
      margin-top: 4px;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #2a344a;
      border-radius: 999px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #3a465f;
    }
  </style>
</head>
<body>
  <header class="popup-header">
    <div class="brand">
      <span class="brand-icon">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <rect x="3" y="4" width="18" height="13" rx="5" fill="currentColor"/>
          <path d="M8 17 L6 21 L12 17 Z" fill="currentColor"/>
        </svg>
      </span>
      <span>Extcom</span>
    </div>
    <button id="open-settings" class="icon-button" type="button" aria-label="Settings">⚙</button>
  </header>

  <section id="view-stats">
    <div class="status-card card" id="status-card" data-state="unknown">
      <p class="status-title"><span class="status-dot"></span><span id="connection-title">Checking…</span></p>
      <p class="status-detail" id="connection-detail"></p>
    </div>

    <div class="stats-grid">
      <div class="stat-card card">
        <span class="stat-value" id="stat-generations">0</span>
        <span class="stat-label">Generated</span>
      </div>
      <div class="stat-card card">
        <span class="stat-value" id="stat-inserted">0</span>
        <span class="stat-label">Inserted</span>
      </div>
    </div>

    <p class="history-heading">Recent history</p>
    <div class="history-list" id="history-list"></div>
  </section>

  <section id="view-settings" hidden>
    <div class="settings-header">
      <button id="back-to-stats" class="icon-button" type="button" aria-label="Back">←</button>
      <h1>Settings</h1>
    </div>

    <div class="tabs" id="settings-tabs" role="tablist">
      <button type="button" class="tab" data-tab="default" role="tab" aria-selected="true">Default</button>
      <button type="button" class="tab" data-tab="advanced" role="tab" aria-selected="false">Advanced</button>
    </div>

    <div id="tab-panel-default" role="tabpanel">
      <label>
        Default tone
        <select id="tone-default"></select>
      </label>
      <label>
        Standing instruction (optional)
        <textarea id="default-instruction" rows="3" placeholder="e.g. never use hashtags"></textarea>
      </label>
      <label>
        <span class="field-row">
          <span>Default reply length</span>
          <span class="field-row-value"><span id="max-length-value">220</span> characters</span>
        </span>
        <input id="max-length" type="range" min="50" max="280" step="10" value="220" />
      </label>
      <label>
        Draft options per generation
        <div class="segmented" id="draft-count" role="group" aria-label="Draft options per generation">
          <button type="button" data-count="1" aria-pressed="false">1</button>
          <button type="button" data-count="2" aria-pressed="false">2</button>
          <button type="button" data-count="3" aria-pressed="true">3</button>
        </div>
      </label>
      <label>
        Use emoji
        <div class="segmented" id="use-emoji" role="group" aria-label="Use emoji">
          <button type="button" data-emoji="off" aria-pressed="false">Off</button>
          <button type="button" data-emoji="on" aria-pressed="true">On</button>
        </div>
      </label>
      <label>
        Read images in posts
        <div class="segmented" id="read-images" role="group" aria-label="Read images in posts">
          <button type="button" data-images="off" aria-pressed="true">Off</button>
          <button type="button" data-images="on" aria-pressed="false">On</button>
        </div>
      </label>
      <p class="hint field-hint">When on, an attached image is sent along with the post text — uses more tokens and takes a bit longer per generate.</p>
    </div>

    <div id="tab-panel-advanced" role="tabpanel" hidden>
      <label>
        Backend URL
        <input id="backend-url" type="url" placeholder="https://your-backend.example.com" />
      </label>
      <label>
        Access token
        <input id="auth-token" type="password" placeholder="eks_..." autocomplete="off" />
      </label>
      <button id="test-connection" class="button-ghost" type="button">Test connection</button>
    </div>

    <button id="save" type="button">Save</button>
    <p class="status" id="status" aria-live="polite"></p>
    <p class="hint">On X, the ✦ AI Reply button only generates drafts using these settings. Posting always stays manual.</p>
    <button id="clear-history" class="button-secondary" type="button">Clear history</button>
    <div class="footer-links">
      <a href="https://github.com/itsjawreal/extcom-ai" target="_blank" rel="noopener noreferrer" aria-label="GitHub repository" title="GitHub repository">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
      </a>
      <a href="https://x.com/itsjaw_real" target="_blank" rel="noopener noreferrer" aria-label="X profile" title="X profile">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      </a>
    </div>
  </section>

  <script type="module" src="/src/popup/popup.ts"></script>
</body>
</html>
